<!--
  =====================================================
  SECTION: Global Footer
  =====================================================
  ELEMENTOR SETUP:
  1. Open the Footer template in Elementor (Templates → Theme Builder → Footer)
  2. Delete the existing footer content/widgets
  3. Add a new full-width section
  4. Drop an HTML widget into it
  5. Paste this entire file's contents into the HTML widget
  6. In the section Style tab → Background → set to #151515
  7. Publish

  Client changes applied:
  - Nav links vertical, Contact removed
  - Double border cleaned up (single top divider only)
  - Year updated to 2026
  - All CSS variables replaced with hardcoded values
  =====================================================
-->

<style>
  /* ================================================
     FOOTER — all values hardcoded (no CSS variables)
     ================================================ */
  .larue-footer {
    background: #151515;
    color: #EEE5D3;
    padding: clamp(4rem, 6vw, 6rem) 2rem 2rem;
    width: 100%;
    box-sizing: border-box;
    font-family: 'Garnett', 'Garnett-Regular', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    font-size: clamp(0.95rem, 1.1vw, 1.0625rem);
    font-weight: 400;
    line-height: 1.65;
  }
  .larue-footer__inner {
    max-width: 1400px;
    margin: 0 auto;
  }
  .larue-footer *,
  .larue-footer a {
    color: #EEE5D3;
    text-decoration: none;
    font-family: 'Garnett', 'Garnett-Regular', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    font-weight: 400;
  }

  /* Wordmark */
  .larue-footer__wordmark {
    display: block;
    width: 100%;
    height: auto;
    max-width: 100%;
    margin-bottom: 3rem;
  }

  /* Main grid: 3 equal columns */
  .larue-footer__body {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 2rem;
    padding-top: 2rem;
    border-top: 1px solid rgba(238, 229, 211, 0.15);
    margin-bottom: 3rem;
    align-items: start;
  }
  @media (max-width: 700px) {
    .larue-footer__body { grid-template-columns: 1fr; gap: 2rem; }
  }

  /* Nav: 2-column sub-grid so 6 items = 3 rows, matching contact height */
  .larue-footer__nav {
    list-style: none;
    margin: 0;
    padding: 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.65rem 1.5rem;
    font-size: clamp(0.9rem, 1vw, 1rem);
  }
  .larue-footer__nav a {
    opacity: 0.65;
    transition: opacity 0.2s ease;
  }
  .larue-footer__nav a:hover { opacity: 1; }

  /* Contact — centered column */
  .larue-footer__contact {
    font-size: clamp(0.9rem, 1vw, 1rem);
    line-height: 1.9;
    opacity: 0.65;
    text-align: center;
  }
  .larue-footer__contact a {
    display: block;
    transition: opacity 0.2s ease;
  }
  .larue-footer__contact a:hover { opacity: 1; }

  /* Legal — right-aligned column */
  .larue-footer__legal {
    font-size: clamp(0.8rem, 0.9vw, 0.875rem);
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    text-align: right;
    opacity: 0.5;
  }
  .larue-footer__legal a {
    transition: opacity 0.2s ease;
  }
  .larue-footer__legal a:hover { opacity: 1; }

  /* Copyright */
  .larue-footer__copyright {
    text-align: center;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    opacity: 0.35;
    padding-top: 2rem;
    border-top: 1px solid rgba(238, 229, 211, 0.1);
  }
</style>

<footer class="larue-footer" role="contentinfo">
  <div class="larue-footer__inner">

    <img
      class="larue-footer__wordmark"
      src="https://laruepr.com/wp-content/uploads/2025/08/FooterLaRue.svg"
      alt="LaRue PR"
      loading="lazy"
      decoding="async"
    >

    <div class="larue-footer__body">
      <nav aria-label="Footer navigation">
        <ul class="larue-footer__nav">
          <li><a href="/">Home</a></li>
          <li><a href="/services/">Services</a></li>
          <li><a href="/work/">Work</a></li>
          <li><a href="/about/">About</a></li>
          <li><a href="/blog/">Blog</a></li>
          <li><a href="/faq/">FAQ</a></li>
        </ul>
      </nav>

      <div class="larue-footer__contact">
        New York, NY
        <a href="mailto:hi@laruepr.com">hi@laruepr.com</a>
        <a href="tel:7326677777">732.667.7777</a>
      </div>

      <div class="larue-footer__legal">
        <a href="/privacy-policy/">Privacy Policy</a>
        <a href="/terms-and-conditions/">Terms and Conditions</a>
        <a href="/accessibility-statement/">Accessibility Statement</a>
      </div>
    </div>

    <div class="larue-footer__copyright">© 2026 | LaRue PR</div>

  </div>
</footer>
