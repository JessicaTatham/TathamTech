<style>
  /* ================================================
     HERO — green
     ================================================ */
  .hero {
    background: var(--c-purple);
    color: var(--c-dark);
    padding: clamp(2rem, 4vw, 3.5rem) 0;
    overflow: hidden;
    min-height: min(75vh, 720px);
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .hero > .container { width: 100%; }
  .hero__grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--gutter);
    align-items: stretch;
  }
  .hero__left {
    padding-right: var(--gutter);
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  @media (max-width: 900px) {
    .hero { min-height: auto; }
  }
  .hero__eyebrow {
    margin-bottom: var(--space-md);
    letter-spacing: 0.2em;
    font-size: 0.75rem;
    white-space: nowrap;
  }
  .hero__eyebrow span + span::before {
    content: " · ";
    margin: 0 0.5em;
    opacity: 0.7;
  }
  .hero__headline {
    font-family: var(--font-heading);
    font-size: clamp(2rem, 5vw, 4rem);
    line-height: 1;
    text-transform: uppercase;
    letter-spacing: -0.025em;
    font-weight: 500;
    margin: 0 0 var(--space-md);
  }
  .hero__accent {
    font-style: italic;
    font-weight: 400;
  }
  .hero__ctas {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 0;
  }
  .hero__carousel {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    align-self: stretch;
  }
  .hero__slot {
    position: relative;
    overflow: hidden;
    border-radius: var(--radius-sm);
    background: rgba(255,255,255,0.15);
    min-height: min(55vh, 520px);
  }
  .hero__slot img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    animation: heroFade 25s infinite;
    animation-fill-mode: both;
  }
  .hero__slot:nth-child(1) img:nth-child(1) { animation-delay: -1s; }
  .hero__slot:nth-child(1) img:nth-child(2) { animation-delay: 4s; }
  .hero__slot:nth-child(1) img:nth-child(3) { animation-delay: 9s; }
  .hero__slot:nth-child(1) img:nth-child(4) { animation-delay: 14s; }
  .hero__slot:nth-child(1) img:nth-child(5) { animation-delay: 19s; }
  .hero__slot:nth-child(2) img:nth-child(1) { animation-delay: -3.5s; }
  .hero__slot:nth-child(2) img:nth-child(2) { animation-delay: 1.5s; }
  .hero__slot:nth-child(2) img:nth-child(3) { animation-delay: 6.5s; }
  .hero__slot:nth-child(2) img:nth-child(4) { animation-delay: 11.5s; }
  .hero__slot:nth-child(2) img:nth-child(5) { animation-delay: 16.5s; }
  @keyframes heroFade {
    0%, 100% { opacity: 0; }
    4%, 20% { opacity: 1; }
    24% { opacity: 0; }
  }
  .hero__ticker {
    margin-top: var(--space-lg);
    padding-top: 1.25rem;
    border-top: 1.5px solid rgba(238, 229, 211, 0.4);
    color: var(--c-cream);
  }
  .hero__ticker-items {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.5rem;
    font-size: clamp(0.8rem, 1.05vw, 1rem);
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .hero__ticker-items .service {
    color: var(--c-cream);
    white-space: nowrap;
    transition: opacity 0.2s ease;
    cursor: pointer;
  }
  .hero__ticker-items .service:hover {
    opacity: 0.75;
  }
  .hero__ticker-items .sep {
    color: var(--c-cream);
    opacity: 0.6;
    font-size: 0.9em;
    user-select: none;
  }
  @media (max-width: 900px) {
    .hero__ticker-items {
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.6rem 1.25rem;
    }
    .hero__ticker-items .sep { display: none; }
  }
  @media (max-width: 900px) {
    .hero__grid { grid-template-columns: 1fr; }
    .hero__left { padding-right: 0; }
    .hero__images { grid-template-columns: 1fr 1fr; }
  }

  /* Mobile fixes */
  @media (max-width: 768px) {
    .hero { padding: clamp(1.5rem, 5vw, 2.5rem) 0; }
    .hero__headline { font-size: clamp(2rem, 8vw, 2.75rem); }
    .hero__eyebrow {
      white-space: normal;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      margin-bottom: 1rem;
    }
    .hero__eyebrow span + span::before { margin: 0 0.35em; }
    .hero__ctas .btn { flex: 1 1 auto; text-align: center; }
    .hero__carousel {
      grid-template-columns: 1fr;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }
    .hero__slot { min-height: 38vh; max-height: 320px; }
    /* Only show the first carousel slot on mobile to keep hero compact */
    .hero__carousel .hero__slot:nth-child(2) { display: none; }
    .hero__ticker { margin-top: var(--space-md); }
  }
  @media (max-width: 480px) {
    .hero__ctas { flex-direction: column; align-items: stretch; }
    .hero__ctas .btn { width: 100%; }
    .hero__slot { min-height: 32vh; max-height: 260px; }
  }
</style>
