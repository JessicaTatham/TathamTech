<style>
  /* ================================================
     HOUSEHOLD BRANDS — dark
     ================================================ */
  .brands {
    background: var(--c-dark);
    color: var(--c-cream);
    padding: clamp(4rem, 7vw, 6rem) 0;
  }
  .brands * { color: inherit !important; }
  .brands .h2 { color: var(--c-cream) !important; }
  .brands .btn { color: var(--c-cream) !important; border-color: var(--c-cream); }
  .brands .btn:hover span { color: var(--c-dark) !important; }
  .brands__head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: var(--space-lg);
    flex-wrap: wrap;
    gap: 1rem;
  }
  .brands__grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0.5rem;
  }
  .brands__item {
    aspect-ratio: 2 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(0.95rem, 1.3vw, 1.2rem);
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 0.5rem 0.75rem;
  }
  .brands__item img {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    object-fit: contain;
    filter: brightness(0) invert(1);
    opacity: 0.8;
    transition: opacity 0.2s ease;
  }
  .brands__item:hover img { opacity: 1; }
  .brands__item.italic { font-style: italic; font-weight: 400; text-transform: none; letter-spacing: 0; }
  @media (max-width: 900px) {
    .brands__grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 600px) {
    .brands__grid { grid-template-columns: repeat(2, 1fr); }
  }

</style>
