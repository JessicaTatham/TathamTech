<style>
  /* ================================================
     HOUSEHOLD BRANDS — dark
     ================================================ */
  .brands {
    background: var(--c-dark);
    color: var(--c-cream);
    padding: clamp(4rem, 7vw, 6rem) 0;
  }
  .brands * { color: inherit !important; }
  .brands .h2 { color: var(--c-cream) !important; }
  .brands .btn { color: #EEE5D3 !important; border-color: #EEE5D3 !important; }
  .brands .btn:hover span { color: #151515 !important; }
  .brands__head {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: var(--space-lg);
    flex-wrap: wrap;
    gap: 1rem;
  }
  .brands__grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0.5rem;
    justify-items: center;
  }
  .brands__item {
    aspect-ratio: 2 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(0.95rem, 1.3vw, 1.2rem);
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 0.5rem 0.75rem;
  }
  .brands__item img {
    height: clamp(32px, 4vw, 54px);
    width: auto;
    max-width: 80%;
    object-fit: contain;
    filter: brightness(0) invert(0.93) sepia(0.95) saturate(0.65) hue-rotate(-15deg);
    opacity: 0.9;
    transition: opacity 0.2s ease;
  }
  .brands__item--lg img {
    height: clamp(50px, 6vw, 80px);
    max-width: 85%;
  }
  .brands__item--xl img {
    height: clamp(70px, 9vw, 120px);
    max-width: 90%;
  }
  .brands__item:hover img { opacity: 1; filter: brightness(0) invert(0.93) sepia(0.95) saturate(0.65) hue-rotate(-15deg); }
  .brands__item.italic { font-style: italic; font-weight: 400; text-transform: none; letter-spacing: 0; }
  @media (max-width: 900px) {
    .brands__grid { grid-template-columns: repeat(3, 1fr); }
  }
  @media (max-width: 600px) {
    .brands__grid { grid-template-columns: repeat(2, 1fr); }
  }

</style>
