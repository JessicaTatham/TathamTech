<!--
  =====================================================
  SECTION: Global Navigation Header
  =====================================================
  ELEMENTOR SETUP:
  1. Open the Header template in Elementor (Templates → Theme Builder → Header)
  2. Delete the existing "Main Navigation" section (and its WordPress Menu widget)
  3. Add a new full-width section at the top
  4. Drop an HTML widget into it
  5. Paste this entire file's contents into the HTML widget
  6. Publish

  REQUIREMENT: The CSS variables (--c-dark, --c-cream, --c-green, etc.) must be
  loaded site-wide. Make sure the WPCode snippet from 00-scripts-wpcode.html is
  set to run on "All Pages" — that covers the header template too.
  =====================================================
-->

<style>
  /* ================================================
     NAV — all values hardcoded (no CSS variables)
     ================================================ */
  .larue-nav {
    position: sticky;
    top: 0;
    z-index: 99999;
    background: #EEE5D3;
    border-bottom: 1px solid rgba(0,0,0,0.05);
    width: 100%;
    font-family: 'Garnett', 'Garnett-Regular', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
  }
  .larue-nav__inner {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 1.25rem 2rem;
    width: 100%;
    box-sizing: border-box;
  }
  .larue-nav__logo {
    display: inline-flex;
    align-items: center;
  }
  .larue-nav__logo img {
    display: block;
    height: 36px;
    width: auto;
    filter: brightness(0);
  }
  .larue-nav__menu {
    justify-self: center;
    display: flex;
    gap: clamp(1rem, 3vw, 2.5rem);
    list-style: none;
    margin: 0;
    padding: 0;
    font-size: 0.95rem;
    font-family: 'Garnett', 'Garnett-Regular', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    align-items: center;
  }
  .larue-nav__menu > li { position: relative; }
  .larue-nav__menu a {
    position: relative;
    padding: 0.25em 0;
    color: #151515;
    text-decoration: none;
    font-family: 'Garnett', 'Garnett-Regular', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
  }
  .larue-nav__menu a.active::before {
    content: "•";
    margin-right: 0.4em;
    color: #151515;
  }
  .larue-nav__menu .has-dropdown > a::after {
    content: "▾";
    font-size: 0.85em;
    margin-left: 0.4em;
    opacity: 0.8;
    display: inline-block;
    transition: transform 0.2s ease;
  }
  .larue-nav__menu .has-dropdown:hover > a::after {
    transform: rotate(180deg);
  }
  .larue-nav__dropdown {
    position: absolute;
    top: 100%;
    left: -0.5rem;
    background: #EEE5D3;
    list-style: none;
    margin: 0;
    padding: 0.5rem 0;
    min-width: 260px;
    border: 1px solid rgba(0,0,0,0.12);
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    border-radius: 4px;
    z-index: 999999;
    opacity: 0;
    visibility: hidden;
    transform: translateY(-4px);
    transition: opacity 0.2s ease, transform 0.2s ease, visibility 0s 0.2s;
  }
  .larue-nav__menu .has-dropdown:hover .larue-nav__dropdown,
  .larue-nav__menu .has-dropdown:focus-within .larue-nav__dropdown {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
    transition: opacity 0.2s ease, transform 0.2s ease, visibility 0s;
  }
  .larue-nav__dropdown a {
    display: block;
    padding: 0.75em 1.25em;
    font-size: 0.9rem;
    font-family: 'Garnett', 'Garnett-Regular', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    color: #151515;
    white-space: nowrap;
    transition: background 0.15s ease;
    text-decoration: none;
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  .larue-nav__dropdown li:last-child a { border-bottom: none; }
  .larue-nav__dropdown a:hover {
    background: rgba(42,169,99,0.08);
    color: #2AA963;
  }
  .larue-nav__cta,
  .larue-nav__burger { justify-self: end; }
  .larue-nav__cta {
    background: #151515 !important;
    color: #EEE5D3 !important;
    padding: 0.65em 1.3em !important;
    border-radius: 999px !important;
    font-size: 0.9rem !important;
    font-family: inherit !important;
    text-decoration: none !important;
    display: inline-block !important;
    line-height: 1.2 !important;
    transition: background 0.2s ease;
  }
  .larue-nav__cta:hover {
    background: #2AA963 !important;
    color: #EEE5D3 !important;
  }
  .larue-nav__burger { display: none; }
  .larue-nav__mobile-contact { display: none; }

  @media (max-width: 900px) {
    .larue-nav__inner { grid-template-columns: 1fr auto; }
    .larue-nav__menu { display: none; }
    .larue-nav__menu.open {
      display: flex !important;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #151515;
      z-index: 9999;
      padding: 6rem 2rem 2rem;
      gap: 0;
      font-size: 1.35rem;
    }
    .larue-nav__menu.open > li { border-bottom: 1px solid rgba(238,229,211,0.12); }
    .larue-nav__menu.open a {
      color: #EEE5D3 !important;
      display: block;
      padding: 1.1rem 0;
    }
    .larue-nav__menu.open .larue-nav__dropdown {
      position: static;
      opacity: 1;
      visibility: visible;
      transform: none;
      background: transparent;
      border: none;
      box-shadow: none;
      min-width: 0;
      padding: 0 0 0.5rem 1rem;
    }
    .larue-nav__menu.open .larue-nav__dropdown a {
      font-size: 1rem;
      padding: 0.6rem 0;
      color: #EEE5D3 !important;
      opacity: 0.6;
      border-bottom: none;
    }
    .larue-nav__menu.open .larue-nav__mobile-contact { display: block; }
    .larue-nav__burger {
      display: inline-flex !important;
      background: none !important;
      background-color: transparent !important;
      border: none !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      font-size: 1.5rem !important;
      padding: 0.25rem 0.5rem !important;
      width: auto !important;
      height: auto !important;
      min-width: 0 !important;
      min-height: 0 !important;
      color: #151515 !important;
      line-height: 1 !important;
      z-index: 10000;
      position: relative;
      cursor: pointer;
    }
    .larue-nav__cta { display: none !important; }
  }
</style>

<nav class="larue-nav" aria-label="Primary">
  <div class="larue-nav__inner">
    <a href="/" class="larue-nav__logo" aria-label="LaRue PR home">
      <img src="https://laruepr.com/wp-content/uploads/2025/08/Logo.svg" alt="LaRue PR" width="120" height="40">
    </a>
    <ul class="larue-nav__menu" id="larue-primary-nav">
      <li><a href="/">Home</a></li>
      <li class="has-dropdown">
        <a href="/services/" aria-haspopup="true" aria-expanded="false">Services</a>
        <ul class="larue-nav__dropdown" aria-label="Services submenu">
          <li><a href="/services/">Public Relations</a></li>
          <li><a href="/services/">Affiliate Marketing &amp; Performance Media</a></li>
          <li><a href="/services/">Influencer &amp; Brand Partnerships</a></li>
          <li><a href="/services/">Events &amp; Activations</a></li>
        </ul>
      </li>
      <li><a href="/work/">Work</a></li>
      <li><a href="/about/">About</a></li>
      <li><a href="/blog/">Blog</a></li>
      <li><a href="/faq/">FAQ</a></li>
      <li class="larue-nav__mobile-contact"><a href="/contact/">Contact</a></li>
    </ul>
    <a href="/contact/" class="larue-nav__cta">Contact →</a>
    <button
      class="larue-nav__burger"
      type="button"
      aria-label="Open menu"
      aria-expanded="false"
      aria-controls="larue-primary-nav"
      onclick="
        var m = document.getElementById('larue-primary-nav');
        if (!m) return;
        var open = m.classList.toggle('open');
        this.setAttribute('aria-expanded', open ? 'true' : 'false');
        this.setAttribute('aria-label', open ? 'Close menu' : 'Open menu');
        if (open) {
          this.textContent = '✕';
          this.style.color = '#EEE5D3';
          document.body.style.overflow = 'hidden';
        } else {
          this.textContent = '☰';
          this.style.color = '';
          document.body.style.overflow = '';
        }
      "
    >☰</button>
  </div>
</nav>

<script>
(function() {
  var burger = document.querySelector('.larue-nav__burger');
  var menu = document.getElementById('larue-primary-nav');
  if (!burger || !menu) return;
  menu.addEventListener('click', function(e) {
    if (e.target.tagName === 'A') {
      menu.classList.remove('open');
      burger.textContent = '☰';
      burger.style.color = '';
      burger.setAttribute('aria-expanded', 'false');
      burger.setAttribute('aria-label', 'Open menu');
      document.body.style.overflow = '';
    }
  });
})();
</script>
