  .publications {

    overflow: hidden;
  }
  .publications__label {
    text-align: center;
    margin-bottom: 1.5rem;
  }
  .publications__marquee {
    display: flex;
    width: max-content;
    gap: clamp(2.5rem, 5vw, 5rem);
    animation: publicationsScroll 60s linear infinite;
    align-items: center;
  }
  .publications__marquee:hover { animation-play-state: paused; }
  .publications__marquee img {
    height: clamp(20px, 2.6vw, 32px);
    width: auto;
    min-width: clamp(60px, 8vw, 110px);
    object-fit: contain;
    display: block;
    opacity: 0.75;
    transition: opacity 0.2s ease;
  }
  .publications__marquee img:hover { opacity: 1; }
  @keyframes publicationsScroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

</style>
